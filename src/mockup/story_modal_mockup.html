<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: Story Modal Mockup (Dynamic)</title>
    
    <!-- Google Fonts: Correctly including Italics, Bold Weights, and Special Decorative Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Outfit:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <!-- CSS Layers (V2 Architecture) -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">
    <link rel="stylesheet" href="../../css/ui_style_matte.css">
    <link rel="stylesheet" href="../../css/ui_facility_badge.css">
    <!-- View Specific -->
    <link rel="stylesheet" href="../../css/story_modal.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }
        .verification-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('../../assets/tutorial/slide1.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.7);
            z-index: 0;
        }
        #modal-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
        }
        /* Demo Controls Positioning */
        .demo-overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body class="ui-style--neon">
    
    <div class="verification-background"></div>

    <div class="demo-overlay">
        <button class="ui-button is-primary" id="demo-random-story">SHOW RANDOM STORY</button>
    </div>

    <div id="modal-container" class="ui-flex-center">
        <!-- Modal will be injected here via UIComponents -->
    </div>

    <script type="module">
        import { UIComponents } from '../systems/ui/UIComponents.js';
        import { STORY_DATA } from '../core/Data.js';

        const container = document.getElementById('modal-container');
        const demoBtn = document.getElementById('demo-random-story');

        function showRandomStory() {
            const keys = Object.keys(STORY_DATA);
            const randomKey = keys[Math.floor(Math.random() * keys.length)];
            
            // Generate HTML via UIComponents (Logic from src/systems/ui/UIComponents.js)
            container.innerHTML = UIComponents.generateStoryModalHTML(randomKey);

            // Setup Close Interaction
            const closeBtn = document.getElementById('story-modal-close');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    container.innerHTML = '';
                });
            }
        }

        demoBtn.addEventListener('click', showRandomStory);

        // Initial Load for Mockup Verification
        showRandomStory();
    </script>
</body>
</html>
