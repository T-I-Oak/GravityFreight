<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight Mockup: Black Market (V2 Redesign)</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">

    <!-- V2 System CSS Layers -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_item_card.css">
    <link rel="stylesheet" href="../../css/ui_style_matte.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">

    <!-- Context Layer (Scene Specific) -->
    <link rel="stylesheet" href="../../css/ui_facility_badge.css">
    <link rel="stylesheet" href="../../css/facility.css">
</head>

<body id="facility-screen">
    <main class="theme-matte FlexCenter">
        <section class="Panel black-market">
            <header class="panel-header">
                <div class="FacilityBadge">B</div>
                <div class="facility-title-group">
                    <h1 class="panel-title">BLACK MARKET</h1>
                    <span class="panel-subtitle">通常は流通しない希少なパーツや、性能が強化された一点物のパーツが取引される取引所。</span>
                </div>
            </header>

            <div class="panel-body">
                <div class="Well">
                    <div class="ColumnSet">
                        <!-- Left Column: Transactions -->
                        <section class="Column ScrollArea">
                            <header class="section-header">
                                <h3 class="section-title">闇セクターの仕入れ品</h3>
                                <span class="section-subtitle">ドック滞在につき1回のみ、性能が強化された一点物を入手できます。</span>
                            </header>

                            <div class="item-list" id="transaction-list">
                                <!-- Generated via JS -->
                            </div>
                        </section>

                        <!-- Right Column: Acquired Items -->
                        <section class="Column ScrollArea">
                            <header class="section-header">
                                <h3 class="section-title">獲得アイテム</h3>
                                <span class="section-subtitle">購入によって獲得したアイテムが表示されます。</span>
                            </header>

                            <div class="item-list" id="acquired-list">
                                <!-- Placeholder -->
                            </div>
                        </section>
                    </div> <!-- /.ColumnSet -->
                </div> <!-- /.Well -->
            </div> <!-- /.panel-body -->

            <!-- Global Actions Section -->
            <footer class="panel-footer">
                <div class="player-credits">
                    <span class="credits-label">CREDITS:</span>
                    <span class="credits-value coin" id="player-credits-value">50 c</span>
                </div>
                <button class="Button state-primary button-large black-market" id="depart-station">
                    <span class="btn-main-label">DEPART FROM STATION</span>
                </button>
            </footer>
        </section>
    </main>

    <script type="module">
        import { UIComponents } from '../systems/ui/UIComponents.js';
        import { PARTS, RARITY } from './mock_data.js';

        // Helper to create a facility entry row
        function createFacilityEntry(item, actionLabel, options = {}) {
            const entry = document.createElement('div');
            entry.className = 'trade-entry SplitRow';

            const itemArea = document.createElement('div');
            itemArea.className = 'trade-item-area';

            // Generate item card HTML
            const cardOptions = { ...options.card };
            itemArea.innerHTML = UIComponents.generateCardHTML(item, cardOptions);

            const actionArea = document.createElement('div');
            actionArea.className = 'trade-action-area SplitColumn';

            const group = document.createElement('div');
            group.className = 'trade-action-group';

            const price = document.createElement('div');
            price.className = 'trade-price coin';
            price.textContent = `${options.price} c`;
            group.appendChild(price);

            const button = document.createElement('button');
            button.className = `Button state-primary`;
            if (options.disabled) button.classList.add('state-disabled');
            button.textContent = actionLabel.toUpperCase();

            actionArea.appendChild(group);
            actionArea.appendChild(button);

            entry.appendChild(itemArea);
            entry.appendChild(actionArea);
            return entry;
        }

        const transactionList = document.getElementById('transaction-list');
        const acquiredList = document.getElementById('acquired-list');

        // Black Market Transactions
        const transactions = [
            {
                item: {
                    id: 'bm_normal',
                    name: '通常取引',
                    category: 'black-market', // Use facility theme color for the indicator
                    description: '資産価値 100c 以上のアイテム。50%の確率でランダムに強化されています。'
                },
                price: 100
            },
            {
                item: {
                    id: 'bm_premium',
                    name: 'プレミアム取引',
                    category: 'black-market',
                    description: '資産価値 500c 以上。80%の確率で強化済み。希少パーツの出現率が大幅に向上します。'
                },
                price: 500,
                disabled: true // Balance is 50c
            }
        ];

        transactions.forEach(cfg => {
            transactionList.appendChild(createFacilityEntry(cfg.item, 'buy', cfg));
        });

        // Acquired Placeholder
        acquiredList.innerHTML = UIComponents.generatePlaceholderHTML(
            'WAITING FOR TRANSACTION',
            '取引を開始すると、ここに獲得したアイテムが表示されます。',
            { category: 'black-market' }
        );

    </script>
</body>

</html>
