<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: ORBITAL ECHOES</title>
    <!-- Fonts: システム標準 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- 3層モデルに基づき、Base, Expression, Context レイヤーを読み込み -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_item_card.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">
    <link rel="stylesheet" href="../../css/title.css">
</head>
<body class="theme-neon">

    <!-- 仕様 3. セマンティクス表に基づき画面ルートを main に定義 -->
    <main id="title-screen">
        <canvas id="title-bg-canvas"></canvas>

        <!-- コンテンツを中央に寄せるための見えないコンテナ -->
        <div class="title-content-wrapper FlexCenter">
            <!-- ロゴエリア：特にカード構造ではないため div (TitleBox) で構成 -->
            <div class="TitleBox">
                <img class="LogoImage title-logo" src="../../assets/logo.svg" alt="GRAVITY FREIGHT ORBITAL ECHOES">
            </div>

            <!-- ボタンメニュー：コンテナとしての div を使用 -->
            <div class="menu-buttons">
                <button class="Button state-primary button-large state-clickable">
                    <span class="btn-main-label">BEGIN CONTRACT</span>
                </button>
                <button class="Button button-large state-clickable">
                    <span class="btn-main-label">HOW TO PLAY</span>
                </button>
                <button class="Button button-large state-clickable">
                    <span class="btn-main-label">RECORDS</span>
                </button>
            </div>
        </div>

        <canvas id="title-fg-canvas"></canvas>

        <!-- 設定指示器： div を使用 -->
        <div class="Button state-clickable" id="title-settings-btn" aria-label="SETTINGS" role="button"><span class="icon-symbol" aria-hidden="true">settings</span></div>

        <!-- 仕様 3. バージョン等の「属性情報」として末尾に footer を配置 -->
        <footer class="screen-footer">
            <span>Ver 0.89.3</span>
            <span>© T.I.OAK 2026 | <a href="https://t-i-oak.github.io/GameWorksOAK/">GameWorks OAK</a></span>
        </footer>

    </main>

</body>
</html>
