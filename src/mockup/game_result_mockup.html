<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: Terminal Report Mockup (V2 Architecture)</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@300;400;700;900&family=Courier+Prime&display=swap" rel="stylesheet">

    <!-- V2 System Styles -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    
    <!-- Style Layers -->
    <link rel="stylesheet" href="../../css/ui_style_printing.css">
    
    <!-- Context Layer (Scene Specific - Placeholder for now) -->
    <!-- <link rel="stylesheet" href="../../css/game_result.css"> -->
    
    <!-- Mockup Specific Helper -->
    <link rel="stylesheet" href="../../css/local_test_layout.css">
</head>

<body>

    <div id="mock-controls" style="position: fixed; top: 10px; left: 10px; z-index: 9999; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; color: white; font-family: sans-serif;">
        <label for="grade-select">SELECT GRADE:</label>
        <select id="grade-select" style="background: #222; color: white; border: 1px solid #444;">
            <option value="SS">SS (Legendary)</option>
            <option value="S">S (Excellent)</option>
            <option value="A">A (Great)</option>
            <option value="B">B (Good)</option>
            <option value="C">C (Average)</option>
            <option value="D" selected>D (Poor)</option>
            <option value="E">E (Failed)</option>
        </select>
        <button onclick="showReport()" style="margin-left: 10px; cursor: pointer;">SHOW / RE-ANIMATE</button>
    </div>

    <!-- コンテナ: #game-result-scene-container -->
    <main id="game-result-scene-container" class="ui-style--printing ui-flex-center">
        <!-- コンテナ内を動的に生成するように変更 -->
    </main>

    <script>
        function showReport() {
            const container = document.getElementById('game-result-scene-container');
            const grade = document.getElementById('grade-select').value;

            // 既存の内容を破棄し、クラスをリセット
            container.classList.remove('active', 'impact');
            container.innerHTML = '';

            // レイアウトの再計算を強制 (Reflow)
            void container.offsetWidth;

            // 表示処理を実行
            renderReport(grade);
        }

        function renderReport(grade) {
            const container = document.getElementById('game-result-scene-container');

            // レシート要素を新しく生成 (.ui-panel を使用)
            const paper = document.createElement('section');
            paper.className = 'ui-panel is-receipt is-scrollable';
            paper.id = 'receipt-content-area';
            container.appendChild(paper);

            // Dummy Data
            const sectors = grade === 'SS' ? 24 : (grade === 'E' ? 0 : 1);
            const collected = grade === 'SS' ? 120 : (grade === 'E' ? 0 : 1);
            const score = grade === 'SS' ? 999999 : (grade === 'E' ? 120 : 4780);
            const now = new Date();
            const timestamp = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            // Stamp Variants
            let sizeVariant = 'normal';
            if (grade === 'SS') sizeVariant = 'huge';
            if (grade === 'E') sizeVariant = 'mini';

            // Grade specific rank text logic
            const rankSectors = grade === 'SS' ? '1st' : grade === 'S' ? '2nd' : grade === 'A' ? '3rd' : '15th';
            const rankCollected = grade === 'SS' ? '1st' : grade === 'S' ? '3rd' : '45th';
            const rankScore = grade === 'SS' ? '1st' : '120th';
            const isTopRankSectors = grade === 'SS' || grade === 'S' || grade === 'A';
            const isTopRankCollected = grade === 'SS' || grade === 'S';
            // Tier Mapping
            const gradeToTier = { 'SS': 1, 'S': 2, 'A': 3, 'B': 4, 'C': 5, 'D': 6, 'E': 7 };
            const tierNum = gradeToTier[grade];
            const isTopGrade = tierNum <= 2; // SS or S

            paper.innerHTML = `
                <header class="ui-panel__header ui-title-box">
                    <h1 class="text-display ui-text-center">TERMINAL REPORT</h1>
                    <p class="text-sub-display ui-text-center">GRAVITY FREIGHT CO. - FINAL EVALUATION</p>
                </header>
                
                <div class="ui-divider is-dotted"></div>
                
                <div class="ui-panel__body">
                    <section class="ui-section">
                        <div class="ui-split-row is-data-row">
                            <span class="ui-stat-label">SECTORS COMPLETED</span>
                            <span class="stat-value num-sector">${sectors} SCS</span>
                        </div>
                        <div class="ui-section-subtitle">
                            SECTOR RANKING <span class="rank-value ${isTopRankSectors ? 'is-top-rank' : ''}">${rankSectors}</span> / GRADE <span class="ui-badge grade-value ${isTopGrade ? 'is-top-rank' : ''}">${grade}</span>
                        </div>
                    </section>

                    <section class="ui-section">
                        <div class="ui-split-row is-data-row">
                            <span class="ui-stat-label">TOTAL COLLECTED</span>
                            <span class="stat-value num-item-count">${collected} PCS</span>
                        </div>
                        <div class="ui-section-subtitle">
                            COLLECTION RANKING <span class="rank-value ${isTopRankCollected ? 'is-top-rank' : ''}">${rankCollected}</span> / GRADE <span class="ui-badge grade-value ${isTopGrade ? 'is-top-rank' : ''}">${grade}</span>
                        </div>
                    </section>

                    <div class="ui-divider is-solid"></div>
                    
                    <section class="ui-section is-hero">
                        <div class="ui-split-row is-data-row">
                            <span class="ui-stat-label">FINAL SCORE</span>
                            <span class="stat-value num-score">${score.toLocaleString()} PTS</span>
                        </div>
                        <div class="ui-section-subtitle">
                            SCORE RANKING <span class="rank-value ${isTopRankScore ? 'is-top-rank' : ''}">${rankScore}</span> / GRADE <span class="ui-badge grade-value ${isTopGrade ? 'is-top-rank' : ''}">${grade}</span>
                        </div>
                    </section>

                    <div class="receipt-stamp-zone">
                        <div class="receipt-official-seal is-tier-${tierNum} ${sizeVariant}" id="report-stamp">
                            <div class="receipt-stamp-left-half">
                                <div class="receipt-stamp-text-line small">OPERATOR AUTH.</div>
                                <div class="receipt-stamp-text-line medium">CONTRACT VERIFIED</div>
                                <div class="receipt-stamp-text-line large">GRADE</div>
                            </div>
                            <div class="receipt-stamp-right-half">
                                ${grade}
                            </div>
                        </div>
                    </div>

                    <div class="barcode-container"></div>
                </div>

                <footer class="ui-panel__footer ui-flex-center">
                    <div class="auth-status">OFFICIAL PERFORMANCE LOG GRANTED</div>
                    <div class="timestamp">${timestamp}</div>
                    <button class="ui-button is-primary is-big" id="receipt-exit-btn">
                        <span class="btn-main-label">END CONTRACT</span>
                    </button>
                </footer>
            `;

            // アニメーション開始
            requestAnimationFrame(() => {
                container.classList.add('active');
            });

            // スタンプアニメーション
            setTimeout(() => {
                const stamp = document.getElementById('report-stamp');
                if (stamp) {
                    const rot = (Math.random() * 60 - 30).toFixed(1);
                    const offX = (Math.random() * 40 - 20).toFixed(1);
                    const offY = (Math.random() * 40 - 20).toFixed(1);
                    stamp.style.setProperty('--stamp-rot', `${rot}deg`);
                    stamp.style.setProperty('--stamp-x', `${offX}px`);
                    stamp.style.setProperty('--stamp-y', `${offY}px`);

                    stamp.classList.add('active');
                    setTimeout(() => {
                        container.classList.add('impact');
                    }, 150); 
                }
            }, 1800);

            const exitBtn = document.getElementById('receipt-exit-btn');
            if (exitBtn) {
                exitBtn.onclick = () => {
                    container.classList.remove('active');
                };
            }
        }
    </script>
</body>

</html>
