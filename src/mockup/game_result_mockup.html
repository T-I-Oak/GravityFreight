<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: Terminal Report Mockup (V1 exact sync)</title>
    <!-- V2 System Styles -->
    <link rel="stylesheet" href="css/design_tokens.css">
    <link rel="stylesheet" href="css/ui_base.css">
    <!-- Style Layers -->
    <link rel="stylesheet" href="css/ui_style_print.css">
    <!-- Target Component Style -->
    <link rel="stylesheet" href="css/game_result.css">
    <!-- Mockup Specific Helper -->
    <link rel="stylesheet" href="css/local_mockup.css">
</head>

<body>

    <div id="mock-controls">
        <label for="grade-select">SELECT GRADE:</label>
        <select id="grade-select">
            <option value="SS">SS (Legendary)</option>
            <option value="S">S (Excellent)</option>
            <option value="A">A (Great)</option>
            <option value="B">B (Good)</option>
            <option value="C">C (Average)</option>
            <option value="D" selected>D (Poor)</option>
            <option value="E">E (Failed)</option>
        </select>
        <button onclick="showReport()">SHOW / RE-ANIMATE</button>
    </div>

    <!-- コンテナ: #game-result-scene-container -->
    <div id="game-result-scene-container" class="ui-overlay ui-style--print">
        <!-- コンテナ内を動的に生成するように変更 -->
    </div>

    <script>
        function showReport() {
            const container = document.getElementById('game-result-scene-container');
            const grade = document.getElementById('grade-select').value;

            // 既存の内容を破棄し、クラスをリセット
            container.classList.remove('active', 'impact');
            container.innerHTML = '';

            // レイアウトの再計算を強制 (Reflow)
            void container.offsetWidth;

            // 表示処理を実行
            renderReport(grade);
        }

        function renderReport(grade) {
            const container = document.getElementById('game-result-scene-container');

            // レシート要素を新しく生成 (スクロール位置やアニメーション状態を初期化するため)
            // .ui-panel と .ui-scrollable を継承
            const paper = document.createElement('div');
            paper.className = 'ui-panel ui-scrollable receipt-paper';
            paper.id = 'receipt-content-area';
            container.appendChild(paper);

            // Dummy Data
            const sectors = grade === 'SS' ? 24 : (grade === 'E' ? 0 : 1);
            const collected = grade === 'SS' ? 120 : (grade === 'E' ? 0 : 1);
            const score = grade === 'SS' ? 999999 : (grade === 'E' ? 120 : 4780);
            const now = new Date();
            const timestamp = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

            // Stamp Variants
            let sizeVariant = 'normal';
            if (grade === 'SS') sizeVariant = 'huge';
            if (grade === 'E') sizeVariant = 'mini';

            paper.innerHTML = `
                <div class="receipt-header">
                    <h1 class="receipt-title">TERMINAL REPORT</h1>
                    <div class="receipt-subtitle">GRAVITY FREIGHT CO. - FINAL EVALUATION</div>
                </div>
                <div class="ui-divider receipt-divider-dotted"></div>
                
                <div class="receipt-item-group">
                    <div class="ui-row receipt-row"><span>SECTORS COMPLETED</span><span>${sectors} SCS</span></div>
                    <div class="receipt-detail">SECTOR RANKING <span class="rank-value ${grade === 'SS' || grade === 'S' || grade === 'A' ? 'top-rank' : ''}">${grade === 'SS' ? '1st' : grade === 'S' ? '2nd' : grade === 'A' ? '3rd' : '15th'}</span> / GRADE <span class="grade-value receipt-grade-${grade.toLowerCase()}">${grade}</span></div>
                </div>

                <div class="receipt-item-group">
                    <div class="ui-row receipt-row"><span>TOTAL COLLECTED</span><span>${collected} PCS</span></div>
                    <div class="receipt-detail">COLLECTION RANKING <span class="rank-value ${grade === 'SS' || grade === 'S' ? 'top-rank' : ''}">${grade === 'SS' ? '1st' : grade === 'S' ? '3rd' : '45th'}</span> / GRADE <span class="grade-value receipt-grade-${grade.toLowerCase()}">${grade}</span></div>
                </div>

                <div class="ui-divider receipt-divider-solid"></div>
                <div class="ui-row receipt-row total"><span>FINAL SCORE</span><span>${score.toLocaleString()} PTS</span></div>
                <div class="receipt-detail">SCORE RANKING <span class="rank-value ${grade === 'SS' ? 'top-rank' : ''}">${grade === 'SS' ? '1st' : '120th'}</span> / GRADE <span class="grade-value receipt-grade-${grade.toLowerCase()}">${grade}</span></div>

                <div class="receipt-stamp-zone">
                    <div class="receipt-official-seal stamp-${grade.toLowerCase()} ${sizeVariant}" 
                         id="report-stamp">
                        <div class="receipt-stamp-left-half">
                            <div class="receipt-stamp-text-line small">OPERATOR AUTH.</div>
                            <div class="receipt-stamp-text-line medium">CONTRACT VERIFIED</div>
                            <div class="receipt-stamp-text-line large">GRADE</div>
                        </div>
                        <div class="receipt-stamp-right-half">
                            ${grade}
                        </div>
                    </div>
                </div>

                <div class="barcode-container"></div>
                <div class="receipt-footer">
                    <div class="auth-status">OFFICIAL PERFORMANCE LOG GRANTED</div>
                    <div class="timestamp">${timestamp}</div>
                </div>
                <button class="ui-button receipt-btn" id="receipt-exit-btn">END CONTRACT</button>
            `;

            // アニメーション開始
            requestAnimationFrame(() => {
                container.classList.add('active');
            });

            // V1同様のディレイでスタンプアニメーション
            setTimeout(() => {
                const stamp = document.getElementById('report-stamp');
                if (stamp) {
                    // V1同様のランダム化 (範囲を ±30°, ±20px に拡大)
                    const rot = (Math.random() * 60 - 30).toFixed(1);
                    const offX = (Math.random() * 40 - 20).toFixed(1);
                    const offY = (Math.random() * 40 - 20).toFixed(1);
                    stamp.style.setProperty('--stamp-rot', `${rot}deg`);
                    stamp.style.setProperty('--stamp-x', `${offX}px`);
                    stamp.style.setProperty('--stamp-y', `${offY}px`);

                    stamp.classList.add('active');
                    // 体感的な心地よさに合わせ、着地の瞬間に合わせて 150ms で揺らします
                    setTimeout(() => {
                        container.classList.add('impact');
                    }, 150); 
                }
            }, 1800);

            const exitBtn = document.getElementById('receipt-exit-btn');
            if (exitBtn) {
                exitBtn.onclick = () => {
                    container.classList.remove('active');
                };
            }
        }
    </script>
</body>

</html>
