<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: Flight Result Mockup (V2 Architecture Verified)</title>
    <!-- Google Fonts: Inter/Outfit (System Display) + Courier Prime (Mono stats) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@300;400;700;900&family=Courier+Prime&display=swap"
        rel="stylesheet">

    <!-- V2 System CSS Layers -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_item_card.css">
    <link rel="stylesheet" href="../../css/ui_style_matte.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">
    
    <!-- Context Layer (Scene Specific) -->
    <link rel="stylesheet" href="../../css/flight_result.css">
</head>

<body>
    <main id="flight-result-screen" class="ui-style--matte ui-flex-center">
        <section class="ui-panel">

            <!-- Header Section -->
            <header class="ui-panel__header ui-split-row">
                <div class="ui-title-box">
                    <h2 id="report-title" class="ui-panel__title is-trading-post">SECTOR 1 COMPLETED</h2>
                </div>
                <div class="flight-report-status">
                    <div class="ui-badge is-recorded is-capsule"><span class="recorded-text">● RECORDED</span></div>
                    <div class="ui-badge is-outline is-inactive is-clickable is-capsule">☆ PROTECT RECORD</div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="ui-panel__body ui-columns">
                <!-- Left Column: Performance data -->
                <section class="ui-column ui-scrollable">
                    <header class="ui-section-header">
                        <h3 class="ui-section-title">FLIGHT PERFORMANCE DATA</h3>
                    </header>

                    <div class="flight-report-summary">
                        <div class="ui-well">
                            <div class="ui-stat-group">
                                <div class="ui-stat-box is-hero">
                                    <span class="ui-stat-label">FLIGHT SCORE</span>
                                    <span class="stat-value num-score">3,260</span>
                                </div>
                                <div class="ui-stat-box is-hero">
                                    <span class="ui-stat-label">CREDITS EARNED</span>
                                    <span class="stat-value num-coin">30</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="ui-split-row is-data-row">
                        <span class="report-data-label">Flight Duration Score</span>
                        <span class="report-data-value num-score">+260</span>
                    </div>
                    <div class="ui-split-row is-data-row">
                        <span class="report-data-label">REPAIR DOCK Reward</span>
                        <span class="report-data-value num-score">+3,000</span>
                    </div>
                    <div class="ui-split-row is-data-row">
                        <span class="report-data-label">REPAIR DOCK Reward Coin</span>
                        <span class="report-data-value num-coin">+30</span>
                    </div>
                </section>

                <!-- Right Column: Acquired assets -->
                <section class="ui-column ui-scrollable">
                    <header class="ui-section-header">
                        <h3 class="ui-section-title">COLLECTED SPACE ASSETS</h3>
                    </header>

                    <div class="ui-item-list">
                        <!-- Dynamic Story Section -->
                        <div id="story-item-container"></div>

                        <!-- Dynamic Items Section -->
                        <div id="acquired-items-list">
                            <!-- Items will be injected here -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- Global Actions Section -->
            <footer class="ui-panel__footer">
                <button class="ui-button is-big" id="btn-view-map">
                    <span class="btn-main-label">VIEW MAP</span>
                </button>
                <button class="ui-button is-primary is-big is-trading-post" id="main-action-btn">
                    <span class="btn-main-label">TO TRADING POST</span>
                </button>
            </footer>
        </section>
    </main>

    <!-- Interactive Mockup Controller & Dynamic Generation -->
    <script type="module">
        import { PARTS } from '../core/Data.js';
        import { UIComponents } from '../systems/ui/UIComponents.js';

        // --- 1. Dynamic Item Generation ---
        const storyContainer = document.getElementById('story-item-container');
        const itemListContainer = document.getElementById('acquired-items-list');

        // A. Story Item (Dynamically generated from ID, marked as NEW)
        storyContainer.innerHTML = UIComponents.generateStoryCardHTML('T', true);

        let html = '';
        
        // B. Chassis x2
        const chassisBase = PARTS.chassis[0];
        if (chassisBase) {
            html += UIComponents.generateCardHTML({ ...chassisBase, count: 2 });
        }

        // B. Encrypted Data (Delivered)
        html += UIComponents.generateCardHTML(PARTS.cargo[2], { status: 'delivered' });

        // Delivery Bonus Items (Sibling list with title)
        const bonusItems = [PARTS.logic[2], PARTS.module[1], PARTS.booster[2]];
        html += `<div class="report-bonus-list">`;
        html += `<h4 class="report-bonus-title">DELIVERY BONUS</h4>`;
        html += bonusItems.map(item => UIComponents.generateCardHTML(item)).join('');
        html += `</div>`;

        // C. Prototype Capacitor (Unmatched)
        html += UIComponents.generateCardHTML(PARTS.cargo[1], { status: 'unmatched' });

        itemListContainer.innerHTML = html;

        // --- 2. View State Controller ---
        const states = [
            { title: 'SECTOR 1 COMPLETED',  btn: 'TO TRADING POST',    cls: 'is-trading-post' },
            { title: 'SECTOR 1 COMPLETED',  btn: 'TO REPAIR DOCK',     cls: 'is-repair-dock'  },
            { title: 'SECTOR 1 COMPLETED',  btn: 'TO BLACK MARKET',    cls: 'is-black-market' },
            { title: 'ROCKET RECOVERED',    btn: 'BACK TO BASE',       cls: 'is-home'        },
            { title: 'SHIP CRASHED',        btn: 'RETRY FLIGHT',       cls: 'is-home'        },
            { title: 'LOST IN SPACE',       btn: 'RETRY FLIGHT',       cls: 'is-home'        }
        ];

        let currentState = 0;
        const btn = document.getElementById('main-action-btn');
        const title = document.getElementById('report-title');

        btn.addEventListener('click', (e) => {
            e.preventDefault();
            currentState = (currentState + 1) % states.length;
            const s = states[currentState];

            title.textContent = s.title;
            btn.querySelector('.btn-main-label').textContent = s.btn;

            // Update classes for both Title and Button for color propagation
            const colorClasses = ['is-repair-dock', 'is-trading-post', 'is-black-market', 'is-home'];
            
            title.classList.remove(...colorClasses);
            title.classList.add(s.cls);

            btn.classList.remove(...colorClasses);
            btn.classList.add(s.cls);
        });
    </script>
</body>

</html>
