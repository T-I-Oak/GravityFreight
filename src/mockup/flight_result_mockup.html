<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight: Flight Result Mockup (V2 Architecture Verified)</title>
    <!-- Google Fonts: Inter/Outfit (System Display) + Courier Prime (Mono stats) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@300;400;700;900&family=Courier+Prime&display=swap"
        rel="stylesheet">

    <!-- V2 System CSS Layers -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_item_card.css">
    <link rel="stylesheet" href="../../css/ui_style_matte.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">
    
    <!-- Context Layer (Scene Specific) -->
    <link rel="stylesheet" href="../../css/flight_result.css">
</head>

<body>
    <main id="flight-result-screen" class="theme-matte FlexCenter"></main>

    <!-- Interactive Mockup Controller & Dynamic Generation -->
    <script type="module">
        import { PARTS, createItemViewData, mockGameDataRepository } from './mock_data.js';
        import { UIComponents } from '../systems/ui/UIComponents.js';

        const screen = document.getElementById('flight-result-screen');
        const states = [
            {
                title: 'SECTOR 1 COMPLETED',
                actionLabel: 'TO TRADING POST',
                themeClass: 'trading-post',
                status: 'cleared',
                replay: { recorded: true, favorite: false, pending: false }
            },
            {
                title: 'SECTOR 1 COMPLETED',
                actionLabel: 'TO REPAIR DOCK',
                themeClass: 'repair-dock',
                status: 'cleared',
                replay: { recorded: true, favorite: false, pending: false }
            },
            {
                title: 'SECTOR 1 COMPLETED',
                actionLabel: 'TO BLACK MARKET',
                themeClass: 'black-market',
                status: 'cleared',
                replay: { recorded: true, favorite: false, pending: false }
            },
            {
                title: 'ROCKET RECOVERED',
                actionLabel: 'BACK TO BASE',
                themeClass: 'home',
                status: 'returned',
                replay: { recorded: true, favorite: false, pending: false }
            },
            {
                title: 'SHIP CRASHED',
                actionLabel: 'BACK TO BASE',
                themeClass: 'home',
                status: 'crashed',
                replay: { recorded: false, favorite: false, pending: true }
            },
            {
                title: 'LOST IN SPACE',
                actionLabel: 'BACK TO BASE',
                themeClass: 'home',
                status: 'lost',
                replay: { recorded: false, favorite: false, pending: true }
            }
        ];

        function createViewData(state) {
            return {
                ...state,
                totalScore: 4760,
                totalCoins: 560,
                entries: [
                    { label: 'Flight Duration Score', score: 260 },
                    { label: 'Goal Bonus', score: 3000, coin: 30 },
                    { label: 'Delivery Bonus', score: 1500, coin: 310 },
                    { label: 'Collected Coins', coin: 100 },
                    { label: 'Insurance Payout', coin: 120 }
                ],
                storyCards: [{ id: 'T', type: 'T', isUnread: true }],
                itemReport: [
                    {
                        type: 'other',
                        item: createItemViewData(PARTS.chassis[0], {}, { count: 2 })
                    },
                    {
                        type: 'delivery',
                        status: 'delivered',
                        item: createItemViewData(PARTS.cargo[2]),
                        bonusItems: [
                            createItemViewData(PARTS.logic[2]),
                            createItemViewData(PARTS.module[1]),
                            createItemViewData(PARTS.booster[2])
                        ]
                    },
                    {
                        type: 'delivery',
                        status: 'unmatched',
                        item: createItemViewData(PARTS.cargo[1])
                    }
                ]
            };
        }

        let currentState = 0;
        function render() {
            screen.innerHTML = UIComponents.generateFlightResultHTML(createViewData(states[currentState]), mockGameDataRepository);
            screen.querySelector('.Button.state-primary').addEventListener('click', (event) => {
                event.preventDefault();
                currentState = (currentState + 1) % states.length;
                render();
            });
            screen.querySelector('.Badge.favorite').addEventListener('click', () => {
                states[currentState].replay.favorite = !states[currentState].replay.favorite;
                states[currentState].replay.recorded = states[currentState].replay.recorded || states[currentState].replay.favorite;
                states[currentState].replay.pending = states[currentState].replay.pending && !states[currentState].replay.favorite;
                render();
            });
        }

        render();
    </script>
</body>

</html>
