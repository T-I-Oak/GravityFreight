<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Freight Mockup: Repair Dock (V2 Redesign)</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">

    <!-- V2 System CSS Layers -->
    <link rel="stylesheet" href="../../css/design_tokens.css">
    <link rel="stylesheet" href="../../css/ui_base.css">
    <link rel="stylesheet" href="../../css/ui_layout.css">
    <link rel="stylesheet" href="../../css/ui_primitives.css">
    <link rel="stylesheet" href="../../css/ui_item_card.css">
    <link rel="stylesheet" href="../../css/ui_style_matte.css">
    <link rel="stylesheet" href="../../css/ui_style_neon.css">
    
    <!-- Context Layer (Scene Specific) -->
    <link rel="stylesheet" href="../../css/ui_facility_badge.css">
    <link rel="stylesheet" href="../../css/facility.css">
</head>

<body id="facility-screen">
    <main class="ui-style--matte ui-flex-center">
        <section class="ui-panel is-repair-dock">
            <header class="ui-panel__header">
                <div class="ui-facility-badge">R</div>
                <div class="facility-title-group">
                    <h1 class="ui-panel__title">REPAIR DOCK</h1>
                    <span class="ui-panel__subtitle">発射台の整備やロケットの分解・強化を行える高度な設備。</span>
                </div>
            </header>

            <div class="ui-panel__body">
                <div class="ui-well">
                    <div class="ui-columns">
                        <!-- Left Column: Maintenance & Dismantle -->
                        <section class="ui-column is-scrollable">
                            <!-- Section 1: Launcher Maintenance -->
                            <header class="ui-section-header">
                                <h3 class="ui-section-title">発射台のメンテナンス</h3>
                                <span class="ui-section-subtitle">ランチャーの使用回数を全回復します。</span>
                            </header>
                            <div class="ui-item-list" id="repair-list">
                                <!-- Generated via JS -->
                            </div>

                            <!-- Section 2: Rocket Dismantle -->
                            <header class="ui-section-header">
                                <h3 class="ui-section-title">ロケットの分解・強化</h3>
                                <span class="ui-section-subtitle">機体を解体し、構成パーツをインベントリに回収します。</span>
                            </header>
                            <div class="ui-item-list" id="dismantle-list">
                                <!-- Generated via JS -->
                            </div>
                        </section>

                        <!-- Right Column: Result / History -->
                        <section class="ui-column ui-scrollable">
                            <header class="ui-section-header">
                                <h3 class="ui-section-title">強化済みパーツ（受取り）</h3>
                                <span class="ui-section-subtitle">分解・強化によって回収されたパーツの一覧。</span>
                            </header>

                            <div class="ui-item-list" id="received-list">
                                <!-- Placeholder Example -->
                            </div>
                        </section>
                    </div> <!-- /.ui-columns -->
                </div> <!-- /.ui-well -->
            </div> <!-- /.ui-panel__body -->

            <!-- Global Actions Section -->
            <footer class="ui-panel__footer">
                <div class="player-credits">
                    <span class="credits-label">CREDITS:</span>
                    <span class="credits-value num-coin" id="player-credits-value">50 c</span>
                </div>
                <button class="ui-button is-primary is-big is-repair-dock" id="depart-station">
                    <span class="btn-main-label">DEPART FROM STATION</span>
                </button>
            </footer>
        </section>
    </main>

    <script type="module">
        import { UIComponents } from '../systems/ui/UIComponents.js';
        import { PARTS } from '../core/Data.js';

        // Helper to create a facility entry row (Reusing logic from Trading Post)
        function createFacilityEntry(item, actionLabel, options = {}) {
            const entry = document.createElement('div');
            entry.className = 'trade-entry ui-split-row';

            const itemArea = document.createElement('div');
            itemArea.className = 'trade-item-area';
            
            // 1. Generate REAL item card HTML
            const cardOptions = { ...options.card };
            itemArea.innerHTML = UIComponents.generateCardHTML(item, cardOptions);

            const actionArea = document.createElement('div');
            actionArea.className = 'trade-action-area ui-split-column';
            
            const group = document.createElement('div');
            group.className = 'trade-action-group';
            
            const price = document.createElement('div');
            price.className = 'trade-price num-coin';
            price.textContent = `${options.price} c`;
            group.appendChild(price);

            const button = document.createElement('button');
            button.className = `ui-button is-primary`;
            
            if (options.disabled) button.classList.add('is-disabled');
            button.textContent = actionLabel.toUpperCase();

            actionArea.appendChild(group);
            actionArea.appendChild(button);

            entry.appendChild(itemArea);
            entry.appendChild(actionArea);
            return entry;
        }

        const repairList = document.getElementById('repair-list');
        const dismantleList = document.getElementById('dismantle-list');
        const receivedList = document.getElementById('received-list');

        // 1. REPAIR SECTION (Paying -> Primary Facility Color)
        // Using exactly PARTS.launcher[0]
        const repairItems = [
            { 
                item: PARTS.launcher[0], 
                price: 10,
                card: { charges: 1 } // Worn state for repair visualization
            }
        ];
        repairItems.forEach(cfg => {
            repairList.appendChild(createFacilityEntry(cfg.item, 'repair', cfg));
        });

        // 2. DISMANTLE SECTION (Paying -> Primary Facility Color)
        // Using exactly PARTS.chassis[0]
        const dismantleItems = [
            { 
                item: PARTS.chassis[0], 
                price: 50,
                card: { isEnhanced: true } // Visual demonstration of enhanced parts
            }
        ];
        dismantleItems.forEach(cfg => {
            dismantleList.appendChild(createFacilityEntry(cfg.item, 'dismantle', cfg));
        });

        // 3. PLACEHOLDER (Using standardized Placeholder component)
        receivedList.innerHTML = UIComponents.generatePlaceholderHTML(
            'NO RECENT ADJUSTMENTS',
            'このセッションでの分解・強化履歴はありません。',
            { category: 'repair-dock' }
        );

    </script>
</body>

</html>
