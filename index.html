<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRAVITY FREIGHT: ORBITAL ECHOES</title>
    <link rel="stylesheet" href="GravityFreight/css/style.css">
</head>
<body>
    <div id="mission-hud" class="panel static">
        <div class="panel-header">
            <h1 id="title">GRAVITY FREIGHT</h1>
        </div>
        <div id="hud-metrics">
            <div class="metric"><span class="label">SECTOR</span><span id="sector-display">1</span></div>
            <div class="metric"><span class="label">SCORE</span><span id="score-display">0</span></div>
        </div>
    </div>

    <div id="message"></div>

    <!-- ビルドシステム UI -->
    <div id="build-overlay">
        <!-- 飛行セクション (右端に固定するため先に記述) -->
        <div class="panel" id="flight-panel">
            <div class="panel-header">
                <h2>FLIGHT TERMINAL</h2>
                <button class="collapse-btn mini-btn" title="Toggle Panel">∧</button>
            </div>
            <div class="category">
                <div class="category-header">
                    <h3>UNIT</h3>
                    <button id="toggle-factory-btn" class="mini-btn">ASSEMBLE NEW</button>
                </div>
                <div id="rocket-list"></div>
            </div>

            <div class="category">
                <h3>ACCELERATOR</h3>
                <div id="accelerator-list"></div>
            </div>
            <div class="category">
                <h3>BOOSTER</h3>
                <div id="acc-option-list" class="option-list">
                    <div class="slot-placeholder">No Booster Equipped</div>
                </div>
            </div>

            <button id="launch-btn" class="hidden">LAUNCH ENGINE</button>
        </div>

        <!-- 建造セクション (左側に展開) -->

        <div class="panel" id="factory-panel">
            <div class="panel-header">
                <h2>ASSEMBLY BAY</h2>
                <button class="collapse-btn mini-btn" title="Toggle Panel">∧</button>
            </div>
            <div class="category">
                <h3>CHASSIS</h3>
                <div id="chassis-list"></div>
            </div>
            <div class="category">
                <h3>LOGIC</h3>
                <div id="logic-list"></div>
            </div>


            <div class="category">
                <h3>MODULE</h3>
                <div id="logic-option-list" class="option-list">
                    <div class="slot-placeholder">Slot Empty (Requires Research)</div>
                </div>
            </div>


            <button id="build-btn" disabled>ASSEMBLE UNIT</button>
        </div>
    </div>



    <!-- 星のアイテム情報パネル (ホバー時表示) -->
    <div id="star-info-panel" class="panel hidden" style="position: absolute; pointer-events: none; z-index: 100;">
        <h2 id="star-info-title">STAR CORE</h2>
        <div id="star-info-list" class="category">
            <!-- JSで動的に追加 -->
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="GravityFreight/src/main.js?v=0.4.1"></script>
</body>
</html>
