<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>GRAVITY FREIGHT: ORBITAL ECHOES</title>
    <link rel="stylesheet" href="GravityFreight/css/style.css">
</head>
<body>
    <div id="mission-hud" class="panel static">
        <div class="panel-header">
            <h1 id="title">GRAVITY FREIGHT</h1>
        </div>
        <div id="hud-metrics">
            <div class="metric"><span class="label">SECTOR</span><span id="sector-display">1</span></div>
            <div class="metric"><span class="label">SCORE</span><span id="score-display">0</span></div>
            <div class="metric"><span class="label">COIN</span><span id="coin-display">0</span></div>
        </div>
    </div>

    <div id="message"></div>

    <!-- ビルドシステム UI -->
    <div id="build-overlay">
        <div class="panel" id="terminal-panel">
            <div class="panel-header">
                <div class="tab-header">
                    <button class="tab-btn active" data-tab="flight">FLIGHT</button>
                    <button class="tab-btn" data-tab="factory">ASSEMBLY</button>
                </div>
                <div id="panel-controls">
                    <button class="collapse-btn" title="Toggle Panel">
                        <span class="icon">∧</span>
                    </button>
                </div>
            </div>
            
            <div id="panel-scroll-area">
                <!-- FLIGHT タブ内容 -->
                <div id="flight-tab" class="tab-content">
                    <div class="category">
                        <div class="category-header">
                            <h3>UNIT</h3>
                        </div>
                        <div id="rocket-list"></div>
                    </div>

                    <div class="category">
                        <h3>LAUNCHER</h3>
                        <div id="launcher-list"></div>
                    </div>
                    <div class="category">
                        <h3>BOOSTER</h3>
                        <div id="acc-option-list" class="option-list">
                            <div class="slot-placeholder">No Booster Equipped</div>
                        </div>
                    </div>
                </div>

                <!-- ASSEMBLY タブ内容 (初期非表示) -->
                <div id="factory-tab" class="tab-content hidden">
                    <div class="category">
                        <h3>CHASSIS</h3>
                        <div id="chassis-list"></div>
                    </div>
                    <div class="category">
                        <h3>LOGIC</h3>
                        <div id="logic-list"></div>
                    </div>

                    <div class="category">
                        <h3>MODULE</h3>
                        <div id="logic-option-list" class="option-list">
                            <div class="slot-placeholder">Slot Empty (Requires Research)</div>
                        </div>
                    </div>

                    <button id="build-btn" disabled>ASSEMBLE UNIT</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 独立した起動ボタンパネル -->
    <div id="launch-control">
        <button id="launch-btn" disabled>LAUNCH ENGINE</button>
    </div>



    <!-- 星のアイテム情報パネル (ホバー時表示) -->
    <div id="star-info-panel" class="panel hidden" style="position: absolute; pointer-events: none; z-index: 100;">
        <h2 id="star-info-title">STAR CORE</h2>
        <div id="star-info-list" class="category">
            <!-- JSで動的に追加 -->
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script type="module" src="GravityFreight/src/main.js?v=0.4.1"></script>
</body>
</html>
