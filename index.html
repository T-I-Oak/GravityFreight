<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Gravity Freight: ORBITAL ECHOES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700;900&family=UnifrakturMaguntia&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/design_tokens.css">
    <link rel="stylesheet" href="css/ui_base.css">
    <link rel="stylesheet" href="css/ui_layout.css">
    <link rel="stylesheet" href="css/ui_primitives.css">
    <link rel="stylesheet" href="css/ui_item_card.css">
    <link rel="stylesheet" href="css/ui_facility_badge.css">
    <link rel="stylesheet" href="css/ui_style_neon.css">
    <link rel="stylesheet" href="css/ui_style_matte.css">
    <link rel="stylesheet" href="css/ui_style_printing.css">
    <link rel="stylesheet" href="css/title.css">
    <link rel="stylesheet" href="css/play.css">
    <link rel="stylesheet" href="css/flight_result.css">
    <link rel="stylesheet" href="css/facility.css">
    <link rel="stylesheet" href="css/archive.css">
    <link rel="stylesheet" href="css/story_modal.css">












</head>

<body>
    <!-- タイトル画面 -->
    <div id="title-screen" class="theme-neon">
        <canvas id="title-bg-canvas"></canvas>
        <div class="title-content-wrapper FlexCenter">
            <div class="TitleBox">
                <img class="LogoImage title-logo" src="/assets/logo.svg" alt="GRAVITY FREIGHT ORBITAL ECHOES">
            </div>
            <div class="menu-buttons">
                <button id="start-game-btn" class="Button button-large state-primary state-clickable">
                    <span class="btn-main-label">BEGIN CONTRACT</span>
                </button>
                <button id="how-to-play-btn" class="Button button-large state-clickable">
                    <span class="btn-main-label">HOW TO PLAY</span>
                </button>
                <button id="archive-btn" class="Button button-large state-clickable">
                    <span class="btn-main-label">RECORDS</span>
                </button>
            </div>
        </div>
        <canvas id="title-fg-canvas"></canvas>
        <div id="title-settings-btn" class="settings-btn" title="SETTINGS">⚙</div>
        <div class="title-footer screen-footer">
            <div id="version">Ver -.--.-</div>
            <span class="copyright"></span>
        </div>
    </div>

    <!-- 実績通知コンテナ -->
    <div id="achievement-toast-container"></div>

    <!-- Replay HUD -->
    <div id="replay-overlay" class="theme-neon state-hidden">
        <div class="panel replay-panel">
            <div class="panel-header">
                <h2>MISSION DATA</h2>
                <div class="replay-badge">STATUS: ARCHIVED</div>
            </div>
            <div class="panel-content">
                <div id="replay-config-list" class="replay-config-list"></div>
            </div>
            <div class="panel-footer">
                <button id="exit-replay-btn" class="Button state-primary">EXIT REPLAY</button>
            </div>
        </div>
    </div>

    <!-- Archive Overlay -->
    <div id="archive-screen-overlay" class="theme-matte state-hidden" hidden></div>


    <!-- 操作説明パネル -->
    <div id="how-to-play-overlay" class="overlay state-hidden">
        <div class="modal tutorial-modal">
            <div class="modal-header">
                <h2>HOW TO PLAY</h2>
            </div>
            <div class="tutorial-slider">
                <div class="tutorial-slides" id="tutorial-slides">
                    <!-- Dynamic content rendered by TutorialUI.js -->
                </div>
            </div>
            <div class="tutorial-nav">
                <div class="nav-controls">
                    <button class="nav-btn prev" id="prev-tutorial-btn">&lt; BACK</button>
                    <div class="tutorial-dots" id="tutorial-dots"></div>
                    <button class="nav-btn next" id="next-tutorial-btn">NEXT &gt;</button>
                </div>
                <button class="nav-btn close-action highlight" id="tutorial-close-btn-bottom">CLOSE</button>
            </div>
        </div>
    </div>

    <main id="play-scene-container" class="theme-neon state-hidden">
        <header id="play-hud" class="Panel color-theme-sub">
            <div class="hud-logo-header">
                <div class="TitleBox">
                    <img id="title" class="LogoImage hud-logo" src="/assets/logo.svg" alt="GRAVITY FREIGHT ORBITAL ECHOES">
                </div>
                <div id="mail-status-group" class="hud-messages">
                    <span id="mail-btn-0" class="Icon mail state-disabled"></span>
                    <span id="mail-btn-1" class="Icon mail state-disabled"></span>
                    <span id="mail-btn-2" class="Icon mail state-disabled"></span>
                </div>
            </div>
            <div class="hud-stats">
                <div class="SplitColumn">
                    <span class="stat-label">SECTOR</span>
                    <span id="sector-display" class="stat-value sector">1</span>
                </div>
                <div class="SplitColumn">
                    <span class="stat-label">COIN</span>
                    <span id="coin-display" class="stat-value coin">0</span>
                </div>
                <div class="SplitColumn">
                    <span class="stat-label">SCORE</span>
                    <span id="score-display" class="stat-value score">0</span>
                </div>
            </div>
        </header>

        <main id="play-screen">
            <canvas id="gameCanvas" class="play-viewport"></canvas>

            <aside id="inventory-panel" class="Panel color-theme-sub">
                <header class="panel-header SplitRow">
                    <div class="TabGroup">
                        <button class="Tab state-clickable state-active" data-tab="flight">FLIGHT</button>
                        <button class="Tab state-clickable" data-tab="assembly">ASSEMBLY</button>
                    </div>
                    <div class="PanelToggle state-clickable" id="btn-toggle-panel">
                        <span class="Icon chevron-down toggle-icon"></span>
                    </div>
                </header>

                <div class="panel-body ScrollArea" id="panel-content">
                    <div class="tab-content" id="tab-flight">
                        <div class="flight-scroll ScrollArea">
                            <section class="section rocket" id="section-rocket">
                                <header class="section-header">
                                    <h3 class="section-title">ROCKET</h3>
                                </header>
                                <div class="item-list" id="list-rocket"></div>
                            </section>

                            <section class="section launcher" id="section-launcher">
                                <header class="section-header">
                                    <h3 class="section-title">LAUNCHER</h3>
                                </header>
                                <div class="item-list" id="list-launcher"></div>
                            </section>

                            <section class="section booster" id="section-booster">
                                <header class="section-header">
                                    <h3 class="section-title">BOOSTER</h3>
                                </header>
                                <div class="item-list" id="list-booster"></div>
                            </section>
                        </div>

                        <div id="launch-control" class="flight-actions">
                            <button id="launch-btn" class="Button state-primary button-large state-hidden state-disabled state-notable launch" disabled>
                                <span class="btn-main-label">LAUNCH ENGINE</span>
                                <span class="btn-sub-label">ロケットと発射台を選択すると発射できます</span>
                            </button>
                        </div>
                    </div>

                    <div id="tab-assembly" class="tab-content state-hidden">
                        <div class="assembly-scroll ScrollArea">
                            <section class="section chassis">
                                <header class="section-header">
                                    <h3 class="section-title">CHASSIS</h3>
                                </header>
                                <div class="item-list" id="list-chassis"></div>
                            </section>
                            <section class="section logic">
                                <header class="section-header">
                                    <h3 class="section-title">LOGIC</h3>
                                </header>
                                <div class="item-list" id="list-logic"></div>
                            </section>
                            <section class="section module">
                                <header class="section-header">
                                    <h3 class="section-title">MODULES</h3>
                                </header>
                                <div class="item-list" id="list-module"></div>
                            </section>
                        </div>

                        <div class="assembly-actions">
                            <button id="build-btn" class="Button state-primary button-large state-disabled state-notable assembly" disabled>
                                <span class="btn-main-label">ASSEMBLE ROCKET</span>
                                <span class="btn-sub-label">シャーシとロジックを選択すると建造できます</span>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>

            <div id="map-action-dock" class="action-dock"></div>
        </main>
    </main>

    <main id="flight-result-screen" class="theme-matte FlexCenter" hidden></main>
    <main id="facility-screen" class="theme-matte FlexCenter" hidden></main>
    <button id="back-to-result-btn" class="Button button-large state-primary state-hidden home">BACK TO RESULT</button>

    <div id="star-info-panel" class="Panel StarInfoPanel state-hidden" hidden>
        <h2 id="star-info-title">STAR CORE</h2>
        <div id="star-info-list" class="star-info-list"></div>
    </div>

    <div id="event-screen" class="overlay-container state-hidden">
        <div class="event-backdrop"></div>
        <div class="event-modal">
            <div class="event-header">
                <div class="event-icon" id="event-icon"></div>
                <div class="event-title-group">
                    <h2 id="event-location">TRADING POST</h2>
                    <p id="event-description">Orbital supply station for cargo trading.</p>
                </div>
            </div>
            <div class="event-content" id="event-content"></div>
            <div class="event-footer">
                <div class="player-credits">
                    <span class="label">CREDITS:</span>
                    <span class="value" id="event-player-credits">0</span>
                    <span class="currency">c</span>
                </div>
                <button id="event-continue-btn" class="premium-button">DEPART FROM STATION</button>
            </div>
        </div>
    </div>

    <div id="sector-notification" class="sector-notif state-hidden"></div>
    <div id="ui-layer"></div>
    <div id="receipt-overlay" class="receipt-view state-hidden">
        <div class="receipt-paper" id="receipt-content-area"></div>
    </div>

    <!-- ストーリー表示モーダル (v0.15) -->
    <div id="story-overlay" class="theme-neon state-hidden">
        <div class="story-modal">
            <div class="story-header">
                <div class="story-branch-icon" id="story-branch-icon">T</div>
                <h2 id="story-title">STORY TITLE</h2>
            </div>
            <div id="story-discovery" class="story-discovery-msg">DISCOVERY MESSAGE</div>
            <div id="story-content" class="story-content-body">STORY CONTENT</div>
            <div class="story-footer">
                <button id="close-story-btn" class="Button state-primary">CLOSE COMMUNICATION</button>
            </div>
        </div>
    </div>
    <!-- 設定パネル -->
    <div id="settings-overlay" class="theme-neon state-hidden">
        <div class="panel settings-modal">
            <div class="panel-header">
                <h2>SETTINGS</h2>
                <button id="close-settings-btn" class="close-btn">×</button>
            </div>
            <div class="panel-content">
                <div class="settings-section">
                    <div class="setting-item">
                        <div class="setting-info">
                            <span class="setting-name">SOUND VOLUME</span>
                            <span id="volume-value-display" class="setting-value">50%</span>
                        </div>
                        <input type="range" id="se-volume-slider" min="0" max="100" value="50" class="premium-slider">
                    </div>
                </div>
            </div>
            <div class="panel-footer">
                <button id="settings-done-btn" class="Button state-primary">DONE</button>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>










</body>

</html>
